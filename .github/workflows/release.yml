name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: iamsauravsharma/cargo-trim
          ref: master
      - name: Get version from Cargo.toml
        id: version
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=v${version}" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: cargo-trim-x86_64-linux
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: cargo-trim-aarch64-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: iamsauravsharma/cargo-trim
          ref: master
      - name: Setup rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/cargo-trim

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Rename binaries
        run: |
          mv cargo-trim-x86_64-linux/cargo-trim cargo-trim-x86_64-linux.bin
          mv cargo-trim-aarch64-darwin/cargo-trim cargo-trim-aarch64-darwin.bin
      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --repo ${{ github.repository }} --yes 2>/dev/null || true
          git push --delete origin latest 2>/dev/null || true
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            --repo ${{ github.repository }} \
            --title "cargo-trim ${{ needs.get-version.outputs.version }}" \
            --notes "Automated build of cargo-trim ${{ needs.get-version.outputs.version }} from upstream" \
            cargo-trim-x86_64-linux.bin \
            cargo-trim-aarch64-darwin.bin
